<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Settings | Majestic Hotels</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <aside>
            <div class="nav-logo">MAJESTIC</div>
            <nav>
                <ul>
                    <li><a href="dashboard.html">Dashboard</a></li>
                    <li><a href="rooms.html">Rooms</a></li>
                    <li><a href="bookings.html">Bookings</a></li>
                    <li><a href="customers.html">Customers</a></li>
                    <li><a href="hotel.html" class="active">Hotel Settings</a></li>
                    <li style="margin-top: 2rem;"><a href="#" onclick="logout()"
                            style="color: var(--danger);">Logout</a></li>
                </ul>
            </nav>
        </aside>
        <main>
            <header>
                <div>
                    <h2 style="font-size: 1.5rem;">Hotel Configuration</h2>
                    <p style="color: var(--text-muted);">Manage your hotel profile and contact details</p>
                </div>
            </header>

            <div class="auth-card" style="max-width: 600px; margin: 0;">
                <form id="hotelForm">
                    <div class="form-group">
                        <label>Hotel Name</label>
                        <input type="text" id="hotelName" placeholder="Majestic Grand Resort" required>
                    </div>
                    <div class="form-group">
                        <label>Address</label>
                        <input type="text" id="hotelAddress" placeholder="123 Luxury Ave, Paradise City" required>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label>Phone</label>
                            <input type="tel" id="hotelPhone" placeholder="+1 234 567 890" required>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="hotelEmail" placeholder="info@majestic.com" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="hotelDesc"
                            style="width: 100%; height: 100px; background: var(--glass); border: 1px solid var(--border); border-radius: 0.75rem; color: white; padding: 0.75rem;"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Update Profile</button>
                </form>
            </div>
        </main>
    </div>

    <script>
        const API_URL = 'http://localhost:8089/api/hotels';

        document.addEventListener('DOMContentLoaded', async () => {
            const res = await fetch(API_URL);
            const hotels = await res.json();
            if (hotels.length > 0) {
                const h = hotels[0];
                document.getElementById('hotelName').value = h.name;
                document.getElementById('hotelAddress').value = h.address;
                document.getElementById('hotelPhone').value = h.phone;
                document.getElementById('hotelEmail').value = h.email;
                document.getElementById('hotelDesc').value = h.description;
                window.currentHotelId = h.id;
            }
        });

        document.getElementById('hotelForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const hotel = {
                id: window.currentHotelId,
                name: document.getElementById('hotelName').value,
                address: document.getElementById('hotelAddress').value,
                phone: document.getElementById('hotelPhone').value,
                email: document.getElementById('hotelEmail').value,
                description: document.getElementById('hotelDesc').value,
            };

            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(hotel)
            });
            alert('Hotel profile updated!');
        });

        function logout() { localStorage.removeItem('user'); window.location.href = '../index.html'; }
    </script>
</body>

</html>
